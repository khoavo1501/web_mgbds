# ===================================================================
# Application Configuration
# ===================================================================
spring.application.name=real-estate-management

# ===================================================================
# Server Configuration
# ===================================================================
server.port=8080
# server.servlet.context-path=/api

# ===================================================================
# Database Configuration - PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/mgbds_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# JWT Configuration
# ===================================================================
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
jwt.expiration=86400000

# ===================================================================
# Logging Configuration
# ===================================================================
logging.level.root=INFO
logging.level.com.realestate.management=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================================================
# Jackson Configuration (Tránh vòng lặp vô hạn khi serialize JSON)
# ===================================================================
spring.jackson.serialization.fail-on-empty-beans=false

# ===================================================================
# Email Configuration (Gmail example - change to your email provider)
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
